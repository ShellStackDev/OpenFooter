<!doctype html>
<html>
  <head><meta charset="UTF-8" /><title>Google Sheet Share URL Example</title></head>
  <body>
    <h1>Google Sheet Share URL Example</h1>
    <p>Paste a normal share/edit URL. OpenFooter auto-converts it to CSV export.</p>
    <script src="../../dist/openfooter.iife.min.js"></script>
    <open-footer
      source="google-sheet"
      url="https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/edit?usp=sharing"
      sheet-gid="0"
      brand-name="OpenFooter Demo"
      theme="dark"
      layout="columns">
    </open-footer>
  </body>
</html>
