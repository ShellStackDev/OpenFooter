<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OpenFooter CDN Local Test</title>
  </head>
  <body>
    <h1>OpenFooter CDN Local Test</h1>
    <script src="../../dist/openfooter.iife.min.js"></script>

    <open-footer
      source="inline-json"
      brand-name="OpenFooter CDN Local Test"
      brand-tagline="This simulates loading the CDN bundle locally"
      theme="dark"
      layout="columns">
    </open-footer>

    <script>
      const footer = document.querySelector('open-footer');
      footer.config = {
        source: 'inline-json',
        brandName: 'OpenFooter CDN Local Test',
        brandTagline: 'This simulates loading the CDN bundle locally',
        theme: 'dark',
        layout: 'columns',
        links: [
          {
            label: 'OpenFooter Repo',
            url: 'https://github.com/prlaclede/OpenFooter',
            type: 'project',
            category: 'Projects',
            priority: 1,
            isActive: true
          }
        ]
      };
      footer.refresh();
    </script>
  </body>
</html>
